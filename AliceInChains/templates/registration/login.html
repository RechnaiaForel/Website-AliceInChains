{% extends 'base.html' %}

{% block title %}Вход — Музыкальный магазин{% endblock %}

{% block content %}
    <h1 class="mb-4">Вход</h1>

    <form method="post" class="col-md-4">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-danger">Неверное имя пользователя или пароль.</div>
        {% endif %}

        <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label">Имя пользователя</label>
            {{ form.username }}
        </div>
        <div class="mb-3">
            <label for="{{ form.password.id_for_label }}" class="form-label">Пароль</label>
            {{ form.password }}
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
{% endblock %}
