{% extends 'base.html' %}

{% block title %}Вход — AliceInChains Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <h1 class="mb-4">Вход</h1>

    <div class="card" style="border-color: var(--color-border)">
      <div class="card-body p-4">
        {% if form.errors %}
          <div class="alert alert-danger">Неверное имя пользователя или пароль.</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <div class="mb-3">
            <label for="id_username" class="form-label fw-semibold">Логин</label>
            <input type="text" name="username" id="id_username" class="form-control" autofocus>
          </div>
          <div class="mb-4">
            <label for="id_password" class="form-label fw-semibold">Пароль</label>
            <input type="password" name="password" id="id_password" class="form-control">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Войти
          </button>
        </form>
      </div>
    </div>

    <p class="text-center mt-3 text-muted">
      Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </p>
  </div>
</div>
{% endblock %}
